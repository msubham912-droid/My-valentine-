<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>From My Heart 💖</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to bottom, #f7a8c3, #fcd6e3);
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Floating Hearts */
.heart {
  position: absolute;
  color: #ff4d88;
  animation: float 6s infinite;
  opacity: 0.6;
}

@keyframes float {
  0% { transform: translateY(100vh) scale(0.5); }
  100% { transform: translateY(-10vh) scale(1.2); }
}

/* Card */
.card {
  background: #fff;
  width: 90%;
  max-width: 350px;
  border-radius: 25px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  position: relative;
  z-index: 10;
}

.card h2 {
  font-weight: 500;
  color: #555;
}

/* Image Container */
.image-container {
  position: relative;
  margin-top: 15px;
}

.image-container img {
  width: 100%;
  border-radius: 20px;
  display: block;
}

/* Visualizer */
.visualizer {
  position: absolute;
  bottom: 55px;
  left: 0;
  width: 100%;
  height: 40px;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 4px;
  pointer-events: none;
}

.bar {
  width: 4px;
  background: #ff4d88;
  border-radius: 3px;
  height: 5px;
  transition: height 0.1s linear;
}

/* Audio Player */
audio {
  position: absolute;
  bottom: 10px;
  left: 5%;
  width: 90%;
  border-radius: 30px;
}

/* Footer Text */
.love-text {
  margin-top: 20px;
  font-size: 22px;
  color: #ff3366;
  font-weight: 600;
}

</style>
</head>
<body>

<!-- Floating Hearts -->
<div class="heart" style="left:10%;">💗</div>
<div class="heart" style="left:30%; animation-duration:7s;">💖</div>
<div class="heart" style="left:60%; animation-duration:5s;">💘</div>
<div class="heart" style="left:80%; animation-duration:8s;">💕</div>

<div class="card">
  <h2>Close your eyes and listen... this is straight from my heart 🎧💖</h2>

  <div class="image-container">
    <img src="your-image.jpg" alt="Her Image">

    <!-- Visualizer -->
    <div class="visualizer" id="visualizer"></div>

    <!-- Audio Player -->
    <audio id="audio" controls>
      <source src="your-audio.mp3" type="audio/mp3">
    </audio>
  </div>

  <div class="love-text">
    I Love You Forever ❤️
  </div>
</div>

<script>
const audio = document.getElementById("audio");
const visualizer = document.getElementById("visualizer");

// Create bars
const barsCount = 30;
for (let i = 0; i < barsCount; i++) {
  const bar = document.createElement("div");
  bar.classList.add("bar");
  visualizer.appendChild(bar);
}

const bars = document.querySelectorAll(".bar");

// Audio Visualizer Setup
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const analyser = audioCtx.createAnalyser();
const source = audioCtx.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(audioCtx.destination);

analyser.fftSize = 64;
const bufferLength = analyser.frequencyBinCount;
const dataArray = new Uint8Array(bufferLength);

function animate() {
  requestAnimationFrame(animate);
  analyser.getByteFrequencyData(dataArray);

  bars.forEach((bar, index) => {
    const value = dataArray[index];
    bar.style.height = value / 2 + "px";
  });
}

audio.onplay = () => {
  audioCtx.resume();
  animate();
};
</script>

</body>
</html>
