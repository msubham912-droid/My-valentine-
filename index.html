<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>From My Heart 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  background: linear-gradient(to bottom, #f7a8c3, #fcd6e3);
}

/* Pages */
.page {
  position: absolute;
  width: 100%;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: transform 0.8s ease;
}

.hidden {
  transform: translateY(-100%);
}

/* Intro Page */
.intro {
  flex-direction: column;
  text-align: center;
  color: white;
}

.intro h1 {
  font-size: 28px;
}

.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: white;
  border: none;
  border-radius: 30px;
  font-size: 16px;
  color: #ff4d88;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

/* Card Page */
.card-container {
  justify-content: center;
  align-items: center;
}

.card {
  background: white;
  width: 90%;
  max-width: 350px;
  border-radius: 25px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.image-container {
  position: relative;
  margin-top: 15px;
}

.image-container img {
  width: 100%;
  border-radius: 20px;
  display: block;
}

/* Visualizer */
.visualizer {
  position: absolute;
  bottom: 55px;
  width: 100%;
  height: 40px;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 4px;
  pointer-events: none;
}

.bar {
  width: 4px;
  background: #ff4d88;
  border-radius: 3px;
  height: 5px;
  transition: height 0.1s linear;
}

/* Audio */
audio {
  position: absolute;
  bottom: 10px;
  left: 5%;
  width: 90%;
}

/* Text */
.love-text {
  margin-top: 20px;
  font-size: 22px;
  color: #ff3366;
  font-weight: 600;
}

</style>
</head>
<body>

<!-- INTRO PAGE -->
<div class="page intro" id="page1">
  <h1>I made something special for you 💖</h1>
  <button class="btn" onclick="openCard()">Open It</button>
</div>

<!-- CARD PAGE -->
<div class="page card-container hidden" id="page2">
  <div class="card">
    <h3>Close your eyes and listen... 🎧💖</h3>

    <div class="image-container">
      <img src="your-image.jpg" alt="Her Image">

      <div class="visualizer" id="visualizer"></div>

      <audio id="audio" controls>
        <source src="your-audio.mp3" type="audio/mp3">
      </audio>
    </div>

    <div class="love-text">
      I Love You Forever ❤️
    </div>
  </div>
</div>

<script>
function openCard() {
  document.getElementById("page1").classList.add("hidden");
  document.getElementById("page2").classList.remove("hidden");
}

/* Visualizer */
const audio = document.getElementById("audio");
const visualizer = document.getElementById("visualizer");

for (let i = 0; i < 30; i++) {
  const bar = document.createElement("div");
  bar.classList.add("bar");
  visualizer.appendChild(bar);
}

const bars = document.querySelectorAll(".bar");

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const analyser = audioCtx.createAnalyser();
const source = audioCtx.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(audioCtx.destination);

analyser.fftSize = 64;
const bufferLength = analyser.frequencyBinCount;
const dataArray = new Uint8Array(bufferLength);

function animate() {
  requestAnimationFrame(animate);
  analyser.getByteFrequencyData(dataArray);

  bars.forEach((bar, index) => {
    const value = dataArray[index];
    bar.style.height = value / 2 + "px";
  });
}

audio.onplay = () => {
  audioCtx.resume();
  animate();
};
</script>

</body>
</html>
