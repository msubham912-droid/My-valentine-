<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>For You ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
background:linear-gradient(270deg,#ff9a9e,#fbc2eb,#a6c1ee,#fad0c4);
background-size:600% 600%;
animation:bgMove 12s infinite ease;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Sparkles */
.sparkle{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:.7;
animation:float 6s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* Card */
.card{
width:350px;
height:500px;
perspective:1000px;
}

.inner{
width:100%;
height:100%;
position:relative;
transition:transform .9s;
transform-style:preserve-3d;
}

.card.flip .inner{
transform:rotateY(180deg);
}

.face{
position:absolute;
width:100%;
height:100%;
backface-visibility:hidden;
border-radius:20px;
padding:25px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

background:rgba(255,255,255,.15);
backdrop-filter:blur(20px);
box-shadow:0 10px 30px rgba(0,0,0,.25);
color:white;
}

/* Back face */
.back{
transform:rotateY(180deg);
}

/* Button ripple */
button{
margin-top:20px;
padding:14px 30px;
border:none;
border-radius:30px;
background:white;
color:#ff4e88;
font-weight:600;
cursor:pointer;
position:relative;
overflow:hidden;
}

button::after{
content:"";
position:absolute;
width:0;
height:0;
border-radius:50%;
background:rgba(0,0,0,.1);
transform:translate(-50%,-50%);
}

button:active::after{
width:200px;
height:200px;
transition:.4s;
}

/* Audio */
img{
width:100%;
border-radius:12px;
margin:10px 0;
}

canvas{
width:100%;
height:70px;
}

audio{
width:100%;
}

h2{color:#ff4e88;}
p{margin:10px 0;}
</style>
</head>

<body>

<script>
/* Sparkles */
for(let i=0;i<25;i++){
let s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(s);
}
</script>

<div class="card" id="card">
<div class="inner">

<!-- Front -->
<div class="face">
<h1>For You ✨</h1>
<p>Tap to reveal something special</p>
<button onclick="flip()">Open</button>
</div>

<!-- Back -->
<div class="face back">

<h2>Hey You ❤️</h2>
<p>You make my world brighter every day ✨</p>

<img src="your-image.jpg">

<canvas id="viz"></canvas>

<audio id="audio" controls>
<source src="love.mp3">
</audio>

</div>
</div>
</div>

<script>
function flip(){
document.getElementById("card").classList.toggle("flip");
}

/* Visualizer */
const audio=document.getElementById("audio");
const canvas=document.getElementById("viz");
const ctx=canvas.getContext("2d");

canvas.width=300;
canvas.height=70;

let ac,an,src;

audio.onplay=()=>{
if(!ac){
ac=new AudioContext();
an=ac.createAnalyser();
src=ac.createMediaElementSource(audio);
src.connect(an);
an.connect(ac.destination);
an.fftSize=128;
}
draw();
};

function draw(){
requestAnimationFrame(draw);

let buffer=new Uint8Array(an.frequencyBinCount);
an.getByteFrequencyData(buffer);

ctx.clearRect(0,0,canvas.width,canvas.height);

let w=canvas.width/buffer.length;

for(let i=0;i<buffer.length;i++){
let h=buffer[i]/2;
ctx.fillStyle=`rgba(255,78,136,0.9)`;
ctx.fillRect(i*w,canvas.height-h,w-2,h);
}
}
</script>

</body>
</html>
