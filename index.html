<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sneha 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0b0c1a;
  color:white;
  overflow:hidden;
}.scene { position:absolute; top:0; left:0; width:100%; height:100vh; display:flex; justify-content:center; align-items:center; flex-direction:column; text-align:center; padding:20px; opacity:0; pointer-events:none; transition:0.5s; z-index:2; }

.scene.active { opacity:1; pointer-events:auto; }

h1 { font-family:'Great Vibes',cursive; font-size:3.5rem; }

.typing { white-space:nowrap; overflow:hidden; border-right:2px solid white; width:0; animation:typing 2s steps(30,end) forwards, blink 0.5s infinite; }

@keyframes typing { to { width:100% } } @keyframes blink { 50% { border-color:transparent } }

.chat { max-width:300px; text-align:left; } .msg { background:#1f2235; padding:10px; border-radius:10px; margin:8px 0; opacity:0; animation:fade 0.5s forwards; }

@keyframes fade { to { opacity:1 } }

.dark { background:black; }

.petal { position:fixed; top:-10px; width:12px; height:12px; background:radial-gradient(circle at 30% 30%, #ffb6c1, #ff4e50); border-radius:50% 70% 50% 70%; opacity:0.8; animation:fall linear forwards; z-index:1; }

@keyframes fall { 0% { transform:translateY(0) rotate(0deg); opacity:1; } 100% { transform:translateY(110vh) rotate(360deg); opacity:0; } } </style>

</head>
<body><div class="scene active" id="scene0">
  <h1>Hey Sneha 💖</h1>
  <p>I made something for you...</p>
</div><div class="scene" id="scene1"><p class="typing">I was thinking what to give you...</p></div>
<div class="scene" id="scene2"><p class="typing">But nothing feels enough for you.</p></div>
<div class="scene" id="scene3"><p class="typing">Because you are not just my best friend...</p></div>
<div class="scene" id="scene4"><p class="typing">You are someone I never want to lose.</p></div><div class="scene" id="chatScene">
  <div class="chat" id="chat"></div>
</div><div class="scene dark" id="finalScene">
  <h2 id="finalText"></h2>
</div><audio id="music" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>

<script>
function show(id){
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startFlow(){
  document.getElementById('music').play();

  setTimeout(()=>show('scene1'),2000);
  setTimeout(()=>show('scene2'),4500);
  setTimeout(()=>show('scene3'),7000);
  setTimeout(()=>show('scene4'),9500);
  setTimeout(showChat,12000);
}

function showChat(){
  show('chatScene');
  const chat=document.getElementById('chat');
  chat.innerHTML="";

  const messages=[
    "You know...",
    "I don’t say this often...",
    "But you matter to me a lot.",
    "More than you realize.",
    "Life feels better with you."
  ];

  messages.forEach((m,i)=>{
    setTimeout(()=>{
      const div=document.createElement('div');
      div.className='msg';
      div.innerText=m;
      chat.appendChild(div);
    },i*700);
  });

  setTimeout(showFinal,6000);
}

function showFinal(){
  show('finalScene');
  const text=document.getElementById('finalText');

  const lines=[
    "Just promise me one thing...",
    "Don’t ever leave my life.",
    "Happy Birthday Sneha 💖"
  ];

  let i=0;
  function next(){
    if(i<lines.length){
      text.innerText=lines[i];
      i++;
      setTimeout(next,1800);
    }
  }
  next();
}

// start automatically after first screen
setTimeout(startFlow,2000);

// petals
setInterval(()=>{
  const petal=document.createElement('div');
  petal.className='petal';
  petal.style.left=Math.random()*100+'vw';
  petal.style.animationDuration=(Math.random()*3+4)+'s';
  petal.style.opacity=Math.random();
  document.body.appendChild(petal);
  setTimeout(()=>petal.remove(),7000);
},300);
</script></body>
</html>
