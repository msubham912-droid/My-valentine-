<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff9ecf,#ffc3e6,#ffd6f5);
  overflow:hidden;
}
.card{
  width:90%;
  max-width:360px;
  background:white;
  padding:25px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
  position:relative;
  z-index:2;
  animation:pop 0.8s ease;
}
@keyframes pop{
  from{transform:scale(0.7);opacity:0}
  to{transform:scale(1);opacity:1}
}
h1{color:#ff4d88;font-size:26px;margin-bottom:10px}
p{font-size:14px;color:#555;margin-bottom:15px;line-height:1.5}
button{
  background:#ff4d88;
  color:white;
  border:none;
  padding:12px 22px;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 5px 15px rgba(255,77,136,0.4);
}
button:active{transform:scale(0.9)}
.hidden{display:none}
.message{
  margin-top:15px;
  animation:fade 1s ease;
}
@keyframes fade{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}.audio-box{ position:relative; width:100%; height:240px; border-radius:20px; margin-top:15px; overflow:hidden; background:url('your-image.jpg') center/cover no-repeat; box-shadow:0 10px 25px rgba(0,0,0,0.3); }

/* Transparent overlay now */ .audio-overlay{ position:absolute; inset:0; background:rgba(0,0,0,0.25); backdrop-filter:blur(2px); display:flex; flex-direction:column; justify-content:center; align-items:center; padding:15px; }

audio{ width:100%; margin-bottom:15px; }

canvas{ width:100%; height:60px; }

.love-text{ color:#ff4d88; margin-top:12px; font-size:20px; animation:pulse 1.5s infinite; } @keyframes pulse{ 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} } .heart{ position:absolute; bottom:-20px; font-size:20px; animation:float 6s linear infinite; color:#ff4d88; } @keyframes float{ 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-100vh) scale(1.5);opacity:0} } </style>

</head>
<body><div class="card">  <div id="intro">
    <h1>Hey My Love 💕</h1>
    <p>I made something small but full of love just for you...</p>
    <button onclick="openCard()">Tap to Open 💌</button>
  </div>  <div id="surprise" class="hidden message">
    <p>Close your eyes and listen… this is straight from my heart. 🎧💖</p><div class="audio-box">
  <div class="audio-overlay">

    <!-- Replace src with your direct mp3 file if needed -->
    <audio id="audio" controls>
      <source src="https://drive.google.com/uc?export=download&id=157gpSeiidlUG36umhc6siY9TzywlPIql" type="audio/mpeg">
    </audio>

    <canvas id="visualizer"></canvas>

  </div>
</div>

<div class="love-text">I Love You Forever ❤️</div>

  </div>
</div><script>
function openCard(){
  document.getElementById('intro').style.display = 'none';
  document.getElementById('surprise').classList.remove('hidden');
}

/* Floating hearts */
function createHeart(){
  const heart=document.createElement('div');
  heart.classList.add('heart');
  heart.innerHTML='❤';
  heart.style.left=Math.random()*100+'vw';
  heart.style.fontSize=(15+Math.random()*20)+'px';
  document.body.appendChild(heart);
  setTimeout(()=>{heart.remove();},6000);
}
setInterval(createHeart,500);

/* Real Audio Visualizer */
const audio = document.getElementById('audio');
const canvas = document.getElementById('visualizer');
const ctx = canvas.getContext('2d');

canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

const audioContext = new (window.AudioContext || window.webkitAudioContext)();
const analyser = audioContext.createAnalyser();
const source = audioContext.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(audioContext.destination);

analyser.fftSize = 256;
const bufferLength = analyser.frequencyBinCount;
const dataArray = new Uint8Array(bufferLength);

function animate(){
  requestAnimationFrame(animate);
  analyser.getByteFrequencyData(dataArray);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const barWidth = (canvas.width / bufferLength) * 2;
  let x = 0;

  for(let i=0;i<bufferLength;i++){
    const barHeight = dataArray[i] / 2;
    ctx.fillStyle = '#ff4d88';
    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
    x += barWidth + 1;
  }
}

audio.onplay = () => {
  audioContext.resume();
  animate();
};
</script></body>
</html>
