<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#fbc2eb,#a6c1ee);
    background-size:400% 400%;
    animation: gradientBG 10s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Background animation */
@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Floating hearts */
.heart{
    position:absolute;
    font-size:20px;
    animation: float 6s linear infinite;
    opacity:0.8;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
    }
    50%{opacity:1;}
    100%{
        transform:translateY(-10vh) scale(1.2);
        opacity:0;
    }
}

/* First page */
.container{
    text-align:center;
    z-index:2;
    color:white;
}

.container h1{
    font-size:28px;
    margin-bottom:20px;
}

.container p{
    margin-bottom:30px;
    font-size:16px;
}

button{
    padding:15px 40px;
    border:none;
    border-radius:50px;
    font-size:18px;
    background:white;
    color:#ff4e88;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

/* Message page */
.message-page{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
    opacity:0;
    pointer-events:none;
    transition:0.8s;
}

.message-page.show{
    opacity:1;
    pointer-events:auto;
}

.message-box{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
    max-width:350px;
}

/* Audio Card */
.audio-card{
    margin-top:20px;
    width:100%;
    max-width:300px;
}

.audio-img{
    width:100%;
    border-radius:15px 15px 0 0;
}

#visualizer{
    width:100%;
    height:80px;
    display:block;
    background:transparent;
}

audio{
    width:100%;
    border-radius:0 0 15px 15px;
}
</style>
</head>

<body>

<script>
/* Floating hearts */
for(let i=0;i<15;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(4+Math.random()*4)+"s";
    heart.style.fontSize=(15+Math.random()*20)+"px";
    document.body.appendChild(heart);
}
</script>

<!-- First Page -->
<div class="container" id="firstPage">
    <h1>For You 💖</h1>
    <p>This is something special just for you ✨</p>
    <button onclick="openMessage()">Open It</button>
</div>

<!-- Message Page -->
<div class="message-page" id="messagePage">
    <div class="message-box">
        <h2 style="color:#ff4e88;">Hey You ❤️</h2>
        <p style="margin:15px 0;color:#444;">
            You make my world brighter every single day ✨
        </p>

        <div class="audio-card">

            <!-- Cover Image -->
            <img src="your-image.jpg" class="audio-img">

            <!-- Visualizer -->
            <canvas id="visualizer"></canvas>

            <!-- Audio -->
            <audio id="audio" controls>
                <source src="love.mp3" type="audio/mpeg">
            </audio>

        </div>
    </div>
</div>

<script>
function openMessage(){
    document.getElementById("firstPage").style.display="none";
    document.getElementById("messagePage").classList.add("show");
}

/* REAL SYNCED VISUALIZER */
const audio = document.getElementById("audio");
const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");

canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

let audioCtx;
let analyser;
let source;

audio.onplay = () => {
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        source = audioCtx.createMediaElementSource(audio);

        source.connect(analyser);
        analyser.connect(audioCtx.destination);

        analyser.fftSize = 256;
    }
    animate();
};

function animate(){
    requestAnimationFrame(animate);

    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    analyser.getByteFrequencyData(dataArray);

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const barWidth = (canvas.width / bufferLength) * 2;
    let x = 0;

    for(let i=0;i<bufferLength;i++){
        const barHeight = dataArray[i]/2;
        ctx.fillStyle = "#ff4e88";
        ctx.fillRect(x,canvas.height-barHeight,barWidth,barHeight);
        x += barWidth + 1;
    }
}
</script>

</body>
</html>
