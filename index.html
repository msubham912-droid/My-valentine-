<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff9ecf,#ffc3e6,#ffd6f5);
  overflow:hidden;
}
.card{
  width:90%;
  max-width:360px;
  background:white;
  padding:25px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
  position:relative;
  z-index:2;
  animation:pop 0.8s ease;
}
@keyframes pop{
  from{transform:scale(0.7);opacity:0}
  to{transform:scale(1);opacity:1}
}
h1{color:#ff4d88;font-size:26px;margin-bottom:10px}
p{font-size:14px;color:#555;margin-bottom:15px;line-height:1.5}
button{
  background:#ff4d88;
  color:white;
  border:none;
  padding:12px 22px;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 5px 15px rgba(255,77,136,0.4);
}
button:active{transform:scale(0.9)}
.hidden{display:none}
.message{
  margin-top:15px;
  animation:fade 1s ease;
}
@keyframes fade{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
iframe{
  width:100%;
  height:220px;
  border:none;
  border-radius:15px;
  margin-top:10px;
}
.love-text{
  color:#ff4d88;
  margin-top:12px;
  font-size:20px;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.1)}
  100%{transform:scale(1)}
}
.heart{
  position:absolute;
  bottom:-20px;
  font-size:20px;
  animation:float 6s linear infinite;
  color:#ff4d88;
}
@keyframes float{
  0%{transform:translateY(0) scale(1);opacity:1}
  100%{transform:translateY(-100vh) scale(1.5);opacity:0}
}
</style>
</head>
<body><div class="card">  <!-- Intro Section -->  <div id="intro">
    <h1>Hey My Love 💕</h1>
    <p>I made something small but full of love just for you...</p>
    <button onclick="openCard()">Tap to Open 💌</button>
  </div>  <!-- Surprise Section -->  <div id="surprise" class="hidden message">
    <p>
      From the day you came into my life, everything feels softer, warmer, and happier. 🌸
      You are my favorite notification, my comfort person, and my forever.
    </p><!-- Google Drive Video Embed -->
<iframe
  src="https://drive.google.com/file/d/1usySB7A5YL1uigtpPLnlf4U66rj-sl3t/preview"
  allow="autoplay">
</iframe>

<div class="love-text">I Love You ❤️</div>

  </div>
</div><script>
function openCard(){
  document.getElementById('intro').style.display = 'none';
  document.getElementById('surprise').classList.remove('hidden');
}

function createHeart(){
  const heart=document.createElement('div');
  heart.classList.add('heart');
  heart.innerHTML='❤';
  heart.style.left=Math.random()*100+'vw';
  heart.style.fontSize=(15+Math.random()*20)+'px';
  document.body.appendChild(heart);
  setTimeout(()=>{heart.remove();},6000);
}
setInterval(createHeart,500);
</script></body>
</html>
